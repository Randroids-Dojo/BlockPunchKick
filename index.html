<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Block Punch Kick Prototype</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="game-shell">
      <header class="hud">
        <section class="hud-side" aria-label="Player health">
          <div class="health-label">Player</div>
          <div class="health-track"><div id="p1-health" class="health-fill player"></div></div>
          <div id="p1-rounds" class="round-dots"></div>
        </section>

        <section class="hud-center" aria-live="polite">
          <div id="round-text" class="round-text">Round 1</div>
          <div id="timer" class="timer">60</div>
          <div id="announcement" class="announcement"></div>
        </section>

        <section class="hud-side" aria-label="CPU health">
          <div class="health-label">CPU</div>
          <div class="health-track"><div id="p2-health" class="health-fill cpu"></div></div>
          <div id="p2-rounds" class="round-dots"></div>
        </section>
      </header>

      <canvas id="arena" aria-label="Block Punch Kick arena"></canvas>

      <!-- Floating joystick: covers the left half of the viewport -->
      <div id="stick-zone" class="stick-zone">
        <div id="stick" class="stick hidden">
          <div class="stick-knob"></div>
        </div>
      </div>

      <!-- Fixed action buttons: always visible on the right side -->
      <div class="action-buttons-fixed">
        <button id="block-btn" class="btn block">Block</button>
        <button id="punch-btn" class="btn punch">Punch</button>
        <button id="kick-btn" class="btn kick">Kick</button>
      </div>

      <details class="help">
        <summary>Controls</summary>
        <p>Move: A/D or ←/→ (W/S or ↑/↓ for vertical lane). Block: hold J or Shift. Punch: K. Kick: L.</p>
      </details>
    </main>

    <script>
      // Detect iframe embedding and add class for compact layout
      if (window.self !== window.top) {
        document.documentElement.classList.add('embedded');
      }
    </script>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
